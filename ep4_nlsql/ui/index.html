<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Catalog — AI Chat</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --user-bg:  #1c2e4a;
      --bot-bg:   #1c2128;
      --success:  #3fb950;
      --error:    #f85149;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }

    #app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; padding: 0 16px; }

    header {
      padding: 20px 0 12px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.15rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
    header h1 span { font-size: 1.3em; }
    header p { color: var(--muted); font-size: 12px; margin-top: 4px; }

    #messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 16px; }

    .msg { display: flex; flex-direction: column; gap: 8px; }
    .msg.user .bubble { align-self: flex-end; background: var(--user-bg); border: 1px solid #264d7d; max-width: 72%; padding: 10px 14px; border-radius: 12px 12px 4px 12px; }
    .msg.bot .bubble  { align-self: flex-start; background: var(--bot-bg); border: 1px solid var(--border); max-width: 100%; padding: 14px 16px; border-radius: 4px 12px 12px 12px; }

    .label { font-size: 11px; color: var(--muted); padding: 0 4px; }
    .msg.user .label { text-align: right; }

    .summary { line-height: 1.55; }
    .follow-up { margin-top: 8px; color: var(--accent); font-size: 12px; cursor: pointer; }
    .follow-up:hover { text-decoration: underline; }

    .sql-block { margin-top: 10px; }
    .sql-block summary { font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
    .sql-block pre { margin-top: 6px; background: #0d1117; border: 1px solid var(--border); padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 12px; color: #79c0ff; white-space: pre-wrap; word-break: break-word; }

    .chart-container { margin-top: 12px; }

    .table-wrap { margin-top: 10px; overflow-x: auto; max-height: 220px; }
    table { border-collapse: collapse; width: 100%; font-size: 12px; }
    th { background: var(--bg); color: var(--muted); text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
    td { padding: 5px 10px; border-bottom: 1px solid #21262d; }
    tr:last-child td { border-bottom: none; }

    .error-msg { color: var(--error); font-size: 13px; }

    .loading { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .dot-anim span { animation: blink 1.2s infinite; display: inline-block; }
    .dot-anim span:nth-child(2) { animation-delay: 0.2s; }
    .dot-anim span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    #input-row { display: flex; gap: 10px; padding: 12px 0 20px; border-top: 1px solid var(--border); }
    #question { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 14px; font-size: 14px; resize: none; height: 48px; }
    #question:focus { outline: none; border-color: var(--accent); }
    #send { background: var(--accent); color: #0d1117; border: none; border-radius: 8px; padding: 0 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    #send:hover { opacity: 0.88; }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }

    .examples { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0; }
    .example-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--muted); cursor: pointer; }
    .example-chip:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1><span>🎬</span> Movie Catalog Chat</h1>
    <p>Ask questions about title performance, revenue, return rates, and more.</p>
  </header>

  <div class="examples">
    <span class="example-chip" onclick="setQ(this)">Which genres have the highest return rate?</span>
    <span class="example-chip" onclick="setQ(this)">Top 5 titles by total revenue</span>
    <span class="example-chip" onclick="setQ(this)">Revenue by region</span>
    <span class="example-chip" onclick="setQ(this)">Quarterly revenue trends</span>
  </div>

  <div id="messages"></div>

  <div id="input-row">
    <textarea id="question" placeholder="Ask a question about the catalog…" rows="1"></textarea>
    <button id="send" onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const API = '/api/v1/chat';
const messagesEl = document.getElementById('messages');
const qEl = document.getElementById('question');
const sendBtn = document.getElementById('send');

function setQ(chip) {
  qEl.value = chip.textContent;
  qEl.focus();
}

qEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

function appendMsg(role, html) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = html;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return msg;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderResult(data) {
  const q = escHtml(data.question);
  let html = `<div class="label">Assistant</div><div class="bubble">`;
  if (data.error) {
    html += `<div class="error-msg">⚠️ ${escHtml(data.error)}</div>`;
  } else {
    html += `<div class="summary">${escHtml(data.summary)}</div>`;
    if (data.follow_up) {
      html += `<div class="follow-up" onclick="setQ(this)">💡 ${escHtml(data.follow_up)}</div>`;
    }
    if (data.sql) {
      html += `<details class="sql-block"><summary>SQL ▾</summary><pre>${escHtml(data.sql)}</pre></details>`;
    }
    if (data.result && data.result.length > 0) {
      const cols = Object.keys(data.result[0]);
      let table = `<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${escHtml(c)}</th>`).join('')}</tr></thead><tbody>`;
      data.result.slice(0, 100).forEach(row => {
        table += `<tr>${cols.map(c=>`<td>${escHtml(row[c]??'')}</td>`).join('')}</tr>`;
      });
      table += '</tbody></table></div>';
      html += table;
    }
    if (data.chart_json) {
      const chartId = 'chart-' + Date.now();
      html += `<div class="chart-container" id="${chartId}"></div>`;
      setTimeout(() => {
        const chartData = JSON.parse(data.chart_json);
        Plotly.newPlot(chartId, chartData.data, {
          ...chartData.layout,
          paper_bgcolor: '#161b22', plot_bgcolor: '#0d1117',
          font: { color: '#e6edf3', size: 11 },
          margin: { t: 30, b: 40, l: 50, r: 20 },
        }, { responsive: true, displayModeBar: false });
      }, 0);
    }
  }
  html += '</div>';
  return html;
}

async function sendMsg() {
  const q = qEl.value.trim();
  if (!q) return;
  qEl.value = '';
  sendBtn.disabled = true;

  appendMsg('user', `<div class="label">You</div><div class="bubble">${escHtml(q)}</div>`);

  const loadingEl = appendMsg('bot',
    `<div class="label">Assistant</div><div class="bubble"><div class="loading">Thinking<div class="dot-anim"><span>.</span><span>.</span><span>.</span></div></div></div>`
  );

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    const data = await res.json();
    if (!res.ok) {
      loadingEl.innerHTML = `<div class="label">Assistant</div><div class="bubble"><div class="error-msg">⚠️ ${escHtml(data.detail || 'Server error')}</div></div>`;
    } else {
      loadingEl.innerHTML = renderResult(data);
    }
  } catch (err) {
    loadingEl.innerHTML = `<div class="label">Assistant</div><div class="bubble"><div class="error-msg">⚠️ Network error: ${escHtml(err.message)}</div></div>`;
  } finally {
    sendBtn.disabled = false;
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}
</script>
</body>
</html>
